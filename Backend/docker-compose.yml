version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    container_name: backend
    restart: always
    command: python manage.py runserver 0.0.0.0:5000

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('127.0.0.1:5000')"]
      interval: 60s
      timeout: 10s
      retries: 3

  


